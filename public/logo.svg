<svg width="320" height="88" viewBox="0 0 320 88" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Royal Fitness">
  <defs>
    <linearGradient id="rf-silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f5f5"/>
      <stop offset="0.5" stop-color="#bdbdbd"/>
      <stop offset="0.55" stop-color="#f5f5f5"/>
      <stop offset="1" stop-color="#8f8f8f"/>
    </linearGradient>
    <linearGradient id="rf-red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e11d3a"/>
