    <circle cx="66" cy="12" r="3.5" fill="url(#rf-silver)"/>
  </g>
  <!-- Wordmark -->
  <text x="96" y="46" font-family="'Bebas Neue', Impact, sans-serif" font-size="34" letter-spacing="2" fill="url(#rf-silver)">ROYAL</text>
  <text x="96" y="74" font-family="'Bebas Neue', Impact, sans-serif" font-size="20" letter-spacing="6" fill="url(#rf-red)">FITNESS</text>
