<svg width="600" height="750" viewBox="0 0 600 750" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trainer photo placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141414"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#e11d3a" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#e11d3a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="750" fill="url(#bg)"/>
  <rect width="600" height="750" fill="url(#glow)"/>
  <!-- dumbbell silhouette -->
  <g transform="translate(300 360)" stroke="#3a3a3a" stroke-width="10" stroke-linecap="round" fill="none">
    <line x1="-110" y1="0" x2="110" y2="0"/>
    <line x1="-110" y1="-34" x2="-110" y2="34"/>
    <line x1="-80" y1="-52" x2="-80" y2="52"/>
    <line x1="110" y1="-34" x2="110" y2="34"/>
    <line x1="80" y1="-52" x2="80" y2="52"/>
  </g>
  <text x="300" y="470" text-anchor="middle" font-family="'Bebas Neue', Impact, sans-serif" font-size="28" letter-spacing="4" fill="#4a4a4a">ROYAL FITNESS</text>
  <text x="300" y="500" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" letter-spacing="2" fill="#3a3a3a">ADD TRAINER IMAGE</text>
</svg>
